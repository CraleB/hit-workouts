<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HIT Workouts">
<title>HIT Workouts</title>
<style>
:root {
  --bg: #ffffff;
  --bg2: #f5f5f5;
  --bg3: #ebebeb;
  --text: #111111;
  --text2: #555555;
  --text3: #999999;
  --border: rgba(0,0,0,0.12);
  --border2: rgba(0,0,0,0.22);
  --accent: #111111;
  --accent-fg: #ffffff;
  --info-bg: #e8f0fd;
  --info-fg: #1a4db3;
  --success-bg: #e6f4ea;
  --success-fg: #1e7e34;
  --warn-bg: #fff3e0;
  --warn-fg: #b45309;
  --danger-bg: #fdecea;
  --danger-fg: #b91c1c;
  --radius: 12px;
  --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111111;
    --bg2: #1e1e1e;
    --bg3: #2a2a2a;
    --text: #f0f0f0;
    --text2: #aaaaaa;
    --text3: #666666;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.2);
    --accent: #f0f0f0;
    --accent-fg: #111111;
    --info-bg: #1a2d52;
    --info-fg: #7eb3f7;
    --success-bg: #1a3325;
    --success-fg: #5cb87a;
    --warn-bg: #2d1f00;
    --warn-fg: #f5a623;
    --danger-bg: #2d1111;
    --danger-fg: #f87171;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg2)}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:var(--text);font-size:16px;overscroll-behavior:none}
.app{max-width:430px;margin:0 auto;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
.header{padding:calc(var(--safe-top) + 14px) 14px 0;background:var(--bg);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:10}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.app-title{font-size:20px;font-weight:600;color:var(--text)}
.header-info{font-size:12px;color:var(--text3)}
.day-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.dtab{padding:6px 13px;border-radius:20px;font-size:13px;font-weight:500;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.dtab.active{background:var(--accent);color:var(--accent-fg);border-color:transparent}
.view-strip{display:flex;border-bottom:0.5px solid var(--border);background:var(--bg)}
.vtab{flex:1;padding:9px;font-size:13px;font-weight:500;background:transparent;border:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent}
.vtab.active{color:var(--text);border-bottom-color:var(--text)}
.screen{flex:1;overflow-y:auto;padding-bottom:80px}
.sec-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:14px 14px 5px}
.wu-card{margin:0 12px 6px;background:var(--warn-bg);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.wu-icon{font-size:18px;margin-top:1px}
.wu-info{flex:1}
.wu-title{font-size:14px;font-weight:600;color:var(--warn-fg)}
.wu-sub{font-size:12px;color:var(--warn-fg);opacity:.85;margin-top:3px;line-height:1.5}
.wu-btn{font-size:13px;padding:6px 12px;border-radius:14px;border:1.5px solid var(--warn-fg);background:transparent;color:var(--warn-fg);cursor:pointer;font-weight:600;white-space:nowrap;font-variant-numeric:tabular-nums;flex-shrink:0;min-width:54px;text-align:center}
.prog-wrap{margin:8px 12px 4px}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.prog-lbl{font-size:11px;color:var(--text3);margin-top:4px}
.ex-card{margin:0 12px 8px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden}
.ex-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none}
.ex-left{flex:1;min-width:0}
.ex-name{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.ex-meta{font-size:12px;color:var(--text3);margin-top:2px}
.ex-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.badge{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:600}
.badge-work{background:var(--info-bg);color:var(--info-fg)}
.badge-cardio{background:var(--success-bg);color:var(--success-fg)}
.chev{font-size:18px;color:var(--text3);transition:transform .2s;display:inline-block}
.chev.open{transform:rotate(180deg)}
.ex-body{border-top:0.5px solid var(--border);padding:12px 14px}
.note{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:10px;line-height:1.6}
.sub-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.ramp-item{font-size:13px;color:var(--text2);padding:2px 0}
.set-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.snum{font-size:12px;color:var(--text3);width:16px;flex-shrink:0;text-align:center}
.sinp{border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:7px 6px;font-size:14px;width:58px;text-align:center;background:var(--bg2);color:var(--text);-webkit-appearance:none}
.sinp:focus{outline:none;border-color:var(--accent)}
.slbl{font-size:11px;color:var(--text3);width:26px}
.sdone{width:30px;height:30px;border-radius:50%;border:0.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0;font-size:15px}
.sdone.chk{background:var(--success-bg);border-color:var(--success-fg);color:var(--success-fg)}
.sdone:not(.chk){color:var(--text3)}
.add-set-btn{font-size:13px;color:var(--info-fg);background:none;border:none;cursor:pointer;padding:3px 0;margin-top:2px;margin-bottom:8px}
.rest-section{margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)}
.rest-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rest-toggle{font-size:13px;padding:7px 14px;border-radius:16px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);font-weight:500}
.rest-toggle.go{background:var(--warn-bg);border-color:var(--warn-fg);color:var(--warn-fg);font-weight:600}
.rest-disp{font-size:22px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums;min-width:60px}
.presets{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}
.preset-btn{font-size:12px;padding:4px 9px;border-radius:10px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-weight:500}
.preset-btn.sel{background:var(--accent);color:var(--accent-fg);border-color:transparent}
.btm-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);border-top:0.5px solid var(--border);padding:10px 12px calc(var(--safe-bot) + 10px);display:flex;gap:8px;z-index:10}
.btn-primary{flex:1;padding:12px;border-radius:var(--radius-sm);background:var(--accent);color:var(--accent-fg);border:none;font-size:15px;font-weight:600;cursor:pointer}
.btn-secondary{padding:12px 14px;border-radius:var(--radius-sm);background:transparent;color:var(--text2);border:0.5px solid var(--border2);font-size:15px;cursor:pointer}
.hist-panel{padding:6px 12px 20px}
.hist-ex{margin-bottom:20px;padding-bottom:20px;border-bottom:0.5px solid var(--border)}
.hist-ex:last-child{border-bottom:none}
.hist-ex-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px}
.hist-empty{font-size:13px;color:var(--text3);padding:12px 0}
.chart{display:flex;align-items:flex-end;gap:4px;height:80px;margin:8px 0 4px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bar{width:100%;background:var(--info-bg);border-radius:3px 3px 0 0;min-height:3px;position:relative}
.bar-val{font-size:10px;color:var(--info-fg);font-weight:600;text-align:center}
.bar-date{font-size:9px;color:var(--text3);text-align:center;margin-top:1px}
.hist-rows{margin-top:4px}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border)}
.hist-row:last-child{border-bottom:none}
.hist-date-lbl{font-size:13px;color:var(--text2)}
.hist-right{display:flex;align-items:center;gap:7px}
.hist-val{font-size:13px;font-weight:600;color:var(--text)}
.delta{font-size:11px;padding:2px 7px;border-radius:8px;font-weight:600}
.delta-up{background:var(--success-bg);color:var(--success-fg)}
.delta-dn{background:var(--danger-bg);color:var(--danger-fg)}
.delta-eq{background:var(--bg2);color:var(--text3)}
.toast{position:fixed;bottom:calc(var(--safe-bot) + 80px);left:50%;transform:translateX(-50%);background:var(--accent);color:var(--accent-fg);padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <span class="app-title">HIT Workouts</span>
      <span class="header-info" id="hdr-info">Ready</span>
    </div>
    <div class="day-tabs">
      <button class="dtab active" onclick="switchDay(0)">Thu · Push</button>
      <button class="dtab" onclick="switchDay(1)">Sat · Back</button>
      <button class="dtab" onclick="switchDay(2)">Sun · Quads</button>
      <button class="dtab" onclick="switchDay(3)">Mon · Biceps</button>
    </div>
  </div>
  <div class="view-strip">
    <button class="vtab active" id="vtab-0" onclick="switchView('session')">Today</button>
    <button class="vtab" id="vtab-1" onclick="switchView('history')">Weight history</button>
  </div>
  <div class="screen" id="screen"></div>
  <div class="btm-bar">
    <button class="btn-secondary" onclick="resetDay()" title="Reset session">↺</button>
    <button class="btn-primary" onclick="finishWorkout()">Finish workout</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const DAYS=[
  {name:"Thu · Push",warmup:{title:"Warm-up · 15 min",desc:"Arm circles fwd+back · 15–20 light cable face pulls — no effort, blood into rotator cuff"},exercises:[
    {name:"Incline DB Press",target:"6–9 reps",weight:40,reps:8,note:"Rest-pause + partials after failure",ramp:[{kg:15,r:5},{kg:25,r:3}],rest:210,cardio:false},
    {name:"Cable Press",target:"8–10 reps",weight:40,reps:9,note:"Hard push — left foot forward",ramp:[{kg:20,r:5}],rest:180,cardio:false},
    {name:"Lateral Raises",target:"10–12 reps",weight:15,reps:11,note:"Elbow leads, slight bend. Watch trap compensation.",ramp:[{kg:6,r:6},{kg:10,r:4}],rest:120,cardio:false},
    {name:"Overhead Press",target:"6–8 reps",weight:30,reps:7,note:"Stop when form goes. Never force reps. (Technical failure 0–1 RIR)",ramp:[{kg:15,r:4}],rest:180,cardio:false},
    {name:"Cable Pushdown",target:"10–12 reps",weight:40,reps:10,note:"Full elbow extension at bottom. No ramp-up needed.",ramp:[],rest:120,cardio:false},
    {name:"Cardio · Steady State",target:"15 min · 60–70% HR",weight:null,reps:null,note:"Keep HR between 114–133 bpm. Treadmill or bike.",ramp:[],rest:900,cardio:true}
  ]},
  {name:"Sat · Posterior + Back",warmup:{title:"Warm-up · 15 min",desc:"Good mornings BW×10 · Back extensions BW×10–12 slow · Hip thrusts: unloaded×10, light×10. Do in this order before loading anything."},exercises:[
    {name:"RDL",target:"6–8 reps",weight:120,reps:7,note:"Slow eccentric. Start from stretched. Never force reps. (Technical failure 0–1 RIR)",ramp:[{kg:40,r:6},{kg:70,r:4},{kg:95,r:2}],rest:240,cardio:false},
    {name:"Leg Curl",target:"10–12 reps",weight:65,reps:11,note:"Rest-pause 20s after failure.",ramp:[{kg:35,r:6}],rest:180,cardio:false},
    {name:"Lat Pulldown",target:"6–9 reps",weight:95,reps:7,note:"Rest-pause ×2. Scapula pull at top.",ramp:[{kg:40,r:5},{kg:65,r:3}],rest:180,cardio:false},
    {name:"DB Row",target:"8–10 reps",weight:35,reps:9,note:"Chest out on bench. No momentum.",ramp:[{kg:20,r:5}],rest:180,cardio:false},
    {name:"Rear Delt",target:"12–15 reps",weight:15,reps:14,note:"Partials after failure. Control the arc.",ramp:[],rest:120,cardio:false}
  ]},
  {name:"Sun · Quads + Calves",warmup:{title:"Warm-up · 15 min",desc:"3–4 min stationary bike, zero resistance · BW squats ×15 slow, 2s pause at bottom"},exercises:[
    {name:"Leg Extension",target:"12–15 reps",weight:50,reps:14,note:"Alternated. Rest-pause 20s after failure. Also your quad pre-exhaust for Hack Squat.",ramp:[{kg:25,r:8}],rest:180,cardio:false},
    {name:"Hack Squat",target:"8–12 reps",weight:125,reps:10,note:"Rest-pause 30s. Posterior pre-fatigued from SAT. Foot wider + toes 15–20° out if medial knee discomfort.",ramp:[{kg:40,r:6},{kg:80,r:4},{kg:100,r:2}],rest:240,cardio:false},
    {name:"Bulgarian Split Squat",target:"near fail",weight:20,reps:13,note:"Roman chair. 20kg DBs.",ramp:[{kg:0,r:5}],rest:180,cardio:false},
    {name:"Calves",target:"10–12 reps",weight:140,reps:12,note:"1-2-3 tempo. 5s stretch hold at bottom.",ramp:[{kg:70,r:8}],rest:120,cardio:false}
  ]},
  {name:"Mon · Biceps",warmup:{title:"Warm-up · 15 min",desc:"2 sets light cable curls — 30% effort, 15 reps. Blood flow into elbow joint only."},exercises:[
    {name:"Incline DB Curl",target:"6–8 reps",weight:17.5,reps:7,note:"Seated incline. Full stretch at bottom. Stretch position = highest injury risk when cold.",ramp:[{kg:8,r:5}],rest:180,cardio:false},
    {name:"Hammer Curl",target:"8–10 reps",weight:20,reps:9,note:"Alternate arms. Rest-pause if needed. No ramp-up needed.",ramp:[],rest:180,cardio:false},
    {name:"Lateral Raises",target:"10–12 reps (1–2 RIR)",weight:15,reps:10,note:"No partials on Mon. Stop 1–2 reps short. Watch Thu performance.",ramp:[{kg:6,r:6},{kg:10,r:4}],rest:120,cardio:false},
    {name:"Face Pulls / Rear Delt Cable",target:"12–15 reps",weight:40,reps:13,note:"Single set. Shoulder health + rear delt. Recovers fast. No ramp-up needed.",ramp:[],rest:120,cardio:false},
    {name:"Cable Pushdown (optional)",target:"10–12 reps",weight:60,reps:10,note:"Only if: HRV above baseline + Body Battery >50 + Thu not regressing.",ramp:[],rest:120,cardio:false},
    {name:"Cardio · Steady State",target:"15 min · 60–70% HR",weight:null,reps:null,note:"Keep HR between 114–133 bpm. Treadmill or bike.",ramp:[],rest:900,cardio:true}
  ]}
];

let curDay=0,openEx=-1,curView='session';
let setsDone={},setWeights={},setReps={};
let restTimers={},restPresets={};
let wuTimer=null,wuRemain=0,wuRunning=false;

function sk(d,e){return `${d}-${e}`}
function save(){try{localStorage.setItem('hit_sets',JSON.stringify(setsDone));localStorage.setItem('hit_w',JSON.stringify(setWeights));localStorage.setItem('hit_r',JSON.stringify(setReps));localStorage.setItem('hit_hist',JSON.stringify(weightHistory));}catch(e){}}
function load(){try{const s=localStorage.getItem('hit_sets');if(s)setsDone=JSON.parse(s);const w=localStorage.getItem('hit_w');if(w)setWeights=JSON.parse(w);const r=localStorage.getItem('hit_r');if(r)setReps=JSON.parse(r);const h=localStorage.getItem('hit_hist');if(h)weightHistory=JSON.parse(h);}catch(e){}}

let weightHistory={};

function switchDay(d){curDay=d;openEx=-1;document.querySelectorAll('.dtab').forEach((t,i)=>t.classList.toggle('active',i===d));render();}
function switchView(v){curView=v;document.getElementById('vtab-0').classList.toggle('active',v==='session');document.getElementById('vtab-1').classList.toggle('active',v==='history');render();}

function fmt(s){const m=Math.floor(s/60);const sec=s%60;return `${m}:${sec.toString().padStart(2,'0')}`}
function fmtShort(s){return s>=60?fmt(s):`${s}s`}

function render(){curView==='history'?renderHistory():renderSession();}

function renderSession(){
  const day=DAYS[curDay];
  let done=0,total=0;
  day.exercises.forEach((ex,ei)=>{
    if(!ex.cardio){(setsDone[sk(curDay,ei)]||[]).forEach(s=>{if(s)done++;});total++;}
  });
  document.getElementById('hdr-info').textContent=`${done} set${done!==1?'s':''} done`;
  const pct=total>0?Math.round((done/total)*100):0;

  let h=`<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><div class="prog-lbl">${done} / ${total} exercises logged today</div></div>`;
  h+=`<div class="sec-label">Warm-up</div>
  <div class="wu-card">
    <div class="wu-icon">🔥</div>
    <div class="wu-info">
      <div class="wu-title">${day.warmup.title}</div>
      <div class="wu-sub">${day.warmup.desc}</div>
    </div>
    <button class="wu-btn" id="wu-btn" onclick="toggleWarmup()">${wuRunning&&wuRemain>0?fmt(wuRemain):'Start'}</button>
  </div>`;
  h+=`<div class="sec-label">Exercises</div>`;

  day.exercises.forEach((ex,ei)=>{
    const isOpen=openEx===ei;
    const sets=setsDone[sk(curDay,ei)]||(ex.cardio?[]:[ false]);
    const doneSets=sets.filter(Boolean).length;
    const badge=ex.cardio?`<span class="badge badge-cardio">Cardio</span>`:`<span class="badge badge-work">Working set</span>`;
    const tick=doneSets>0?` ✓`:'';

    h+=`<div class="ex-card">
      <div class="ex-hdr" onclick="toggleEx(${ei})">
        <div class="ex-left">
          <div class="ex-name">${ex.name}<span style="color:var(--success-fg);font-size:13px">${tick}</span></div>
          <div class="ex-meta">${ex.target}${ex.weight!=null?` · ${ex.weight}kg`:''}</div>
        </div>
        <div class="ex-right">${badge}<span class="chev ${isOpen?'open':''}">⌄</span></div>
      </div>`;

    if(isOpen){
      h+=`<div class="ex-body">`;
      if(ex.note) h+=`<div class="note">ℹ ${ex.note}</div>`;

      if(ex.ramp&&ex.ramp.length){
        h+=`<div class="sub-lbl">Ramp-up sets</div>`;
        ex.ramp.forEach(r=>{h+=`<div class="ramp-item">${r.kg===0?'BW':r.kg+'kg'} × ${r.r} reps</div>`;});
        h+=`<div style="height:10px"></div>`;
      }

      if(!ex.cardio){
        h+=`<div class="sub-lbl" style="margin-top:4px">Working sets</div>`;
        sets.forEach((chkd,si)=>{
          const w=setWeights[sk(curDay,ei)]?.[si]??ex.weight;
          const r=setReps[sk(curDay,ei)]?.[si]??ex.reps;
          h+=`<div class="set-row">
            <span class="snum">${si+1}</span>
            <input class="sinp" type="number" value="${w??''}" min="0" step="0.5" inputmode="decimal" onchange="saveW(${ei},${si},this.value)" style="width:58px">
            <span class="slbl">kg</span>
            <input class="sinp" type="number" value="${r??''}" min="0" step="1" inputmode="numeric" onchange="saveR(${ei},${si},this.value)" style="width:52px">
            <span class="slbl">reps</span>
            <button class="sdone ${chkd?'chk':''}" onclick="toggleSet(${ei},${si})" aria-label="Mark set ${si+1} done">${chkd?'✓':'○'}</button>
          </div>`;
        });
        h+=`<button class="add-set-btn" onclick="addSet(${ei})">+ Add set</button>`;
      } else {
        h+=`<div style="font-size:13px;color:var(--text2);margin-bottom:10px">Keep HR between 114–133 bpm for 15 minutes.</div>`;
      }

      const rtKey=sk(curDay,ei);
      const running=restTimers[rtKey];
      const selPre=restPresets[rtKey]??ex.rest;
      const dispVal=running?fmt(running.remain):(ex.cardio?'15:00':fmtShort(selPre));
      h+=`<div class="rest-section">
        <div class="rest-row">
          <button class="rest-toggle ${running?'go':''}" onclick="toggleRest(${ei})">${running?(ex.cardio?'Running ◼':'Resting ◼'):(ex.cardio?'▶ Start timer':'▶ Start rest')}</button>
          <span class="rest-disp" id="rd-${ei}">${dispVal}</span>
        </div>`;
      if(!ex.cardio){
        h+=`<div class="presets">`;
        [[60,'1m'],[90,'1.5m'],[120,'2m'],[180,'3m'],[210,'3.5m'],[240,'4m']].forEach(([s,l])=>{
          h+=`<button class="preset-btn ${selPre===s&&!running?'sel':''}" onclick="setPre(${ei},${s})">${l}</button>`;
        });
        h+=`</div>`;
      }
      h+=`</div></div>`;
    }
    h+=`</div>`;
  });

  document.getElementById('screen').innerHTML=h;
}

function renderHistory(){
  document.getElementById('hdr-info').textContent='All sessions';
  const day=DAYS[curDay];
  let h=`<div class="hist-panel">`;
  day.exercises.forEach((ex,ei)=>{
    if(ex.cardio)return;
    const hkey=sk(curDay,ei);
    const hist=weightHistory[hkey]||[];
    h+=`<div class="hist-ex"><div class="hist-ex-name">${ex.name}</div>`;
    if(!hist.length){h+=`<div class="hist-empty">No sessions logged yet</div></div>`;return;}
    const recent=hist.slice(-6);
    const maxW=Math.max(...recent.map(s=>s.maxW));
    h+=`<div class="chart">`;
    recent.forEach(s=>{
      const pct=maxW>0?Math.max(Math.round((s.maxW/maxW)*100),4):4;
      h+=`<div class="bar-wrap">
        <div class="bar-val">${s.maxW}</div>
        <div class="bar" style="height:${pct*0.65}px"></div>
        <div class="bar-date">${s.date}</div>
      </div>`;
    });
    h+=`</div><div class="hist-rows">`;
    hist.slice().reverse().slice(0,6).forEach((s,i,arr)=>{
      const prev=arr[i+1];
      let delta='';
      if(prev){const diff=parseFloat((s.maxW-prev.maxW).toFixed(1));if(diff>0)delta=`<span class="delta delta-up">+${diff}kg</span>`;else if(diff<0)delta=`<span class="delta delta-dn">${diff}kg</span>`;else delta=`<span class="delta delta-eq">same</span>`;}
      h+=`<div class="hist-row"><span class="hist-date-lbl">${s.date}</span><div class="hist-right"><span class="hist-val">${s.maxW}kg × ${s.maxR}r</span>${delta}</div></div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;
  document.getElementById('screen').innerHTML=h;
}

function toggleEx(ei){openEx=openEx===ei?-1:ei;render();}

function toggleSet(ei,si){
  const k=sk(curDay,ei);
  if(!setsDone[k])setsDone[k]=[false];
  setsDone[k][si]=!setsDone[k][si];
  openEx=ei;save();render();
}

function addSet(ei){
  const k=sk(curDay,ei);
  if(!setsDone[k])setsDone[k]=[false];
  setsDone[k].push(false);
  openEx=ei;save();render();
}

function saveW(ei,si,val){
  const k=sk(curDay,ei);
  if(!setWeights[k])setWeights[k]={};
  setWeights[k][si]=parseFloat(val)||0;
  save();
}

function saveR(ei,si,val){
  const k=sk(curDay,ei);
  if(!setReps[k])setReps[k]={};
  setReps[k][si]=parseInt(val)||0;
  save();
}

function setPre(ei,secs){
  const k=sk(curDay,ei);
  if(restTimers[k]){clearInterval(restTimers[k].id);delete restTimers[k];}
  restPresets[k]=secs;
  openEx=ei;render();
}

function toggleRest(ei){
  const k=sk(curDay,ei);
  if(restTimers[k]){clearInterval(restTimers[k].id);delete restTimers[k];openEx=ei;render();return;}
  const ex=DAYS[curDay].exercises[ei];
  const secs=ex.cardio?900:(restPresets[k]??ex.rest);
  let remain=secs;
  restTimers[k]={remain,id:null};
  openEx=ei;render();
  restTimers[k].id=setInterval(()=>{
    remain--;
    if(restTimers[k])restTimers[k].remain=remain;
    const d=document.getElementById(`rd-${ei}`);
    if(d)d.textContent=fmt(remain);
    if(remain<=0){
      clearInterval(restTimers[k]?.id);
      delete restTimers[k];
      const btn=document.querySelector(`[onclick="toggleRest(${ei})"]`);
      if(btn){btn.textContent='Done ✓';btn.classList.remove('go');}
      showToast('Rest done!');
    }
  },1000);
}

function toggleWarmup(){
  if(wuTimer){clearInterval(wuTimer);wuTimer=null;wuRunning=false;wuRemain=0;render();return;}
  wuRunning=true;wuRemain=900;
  const btn=()=>document.getElementById('wu-btn');
  wuTimer=setInterval(()=>{
    wuRemain--;
    const b=btn();if(b)b.textContent=fmt(wuRemain);
    if(wuRemain<=0){clearInterval(wuTimer);wuTimer=null;wuRunning=false;const b=btn();if(b)b.textContent='Done ✓';showToast('Warm-up done!');}
  },1000);
  render();
}

function resetDay(){
  if(!confirm('Reset today\'s session?'))return;
  const pfx=`${curDay}-`;
  Object.keys(setsDone).filter(k=>k.startsWith(pfx)).forEach(k=>delete setsDone[k]);
  Object.keys(setWeights).filter(k=>k.startsWith(pfx)).forEach(k=>delete setWeights[k]);
  Object.keys(setReps).filter(k=>k.startsWith(pfx)).forEach(k=>delete setReps[k]);
  Object.keys(restTimers).filter(k=>k.startsWith(pfx)).forEach(k=>{clearInterval(restTimers[k].id);delete restTimers[k];});
  Object.keys(restPresets).filter(k=>k.startsWith(pfx)).forEach(k=>delete restPresets[k]);
  clearInterval(wuTimer);wuTimer=null;wuRunning=false;wuRemain=0;
  openEx=-1;save();render();
}

function finishWorkout(){
  const day=DAYS[curDay];
  const today=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
  day.exercises.forEach((ex,ei)=>{
    if(ex.cardio)return;
    const hkey=sk(curDay,ei);
    const wMap=setWeights[hkey]||{};
    const rMap=setReps[hkey]||{};
    const sets=setsDone[hkey]||[];
    let maxW=0,maxR=0;
    sets.forEach((done,si)=>{
      if(done){
        const w=parseFloat(wMap[si]??ex.weight??0);
        const r=parseInt(rMap[si]??ex.reps??0);
        if(w>maxW||(w===maxW&&r>maxR)){maxW=w;maxR=r;}
      }
    });
    if(maxW>0){
      if(!weightHistory[hkey])weightHistory[hkey]=[];
      weightHistory[hkey].push({date:today,maxW,maxR});
    }
  });
  save();
  showToast('Session saved!');
  setTimeout(()=>{switchView('history');},800);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

load();render();
</script>
</body>
</html>
